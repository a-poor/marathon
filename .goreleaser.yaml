# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    # if you don't do these things before calling goreleaser, it might be a
    # good idea to do them here:
    - rustup default stable
    - cargo install --locked cargo-zigbuild
    - cargo fetch --locked
    # Generate shell completion scripts for the Homebrew cask to install. The
    # output is arch-independent text, so a host build is fine. `sh -c` is needed
    # because goreleaser doesn't run hooks through a shell, so `>` won't redirect.
    - mkdir -p completions
    - sh -c 'cargo run -q -- completions bash > completions/marathon.bash'
    - sh -c 'cargo run -q -- completions zsh  > completions/marathon.zsh'
    - sh -c 'cargo run -q -- completions fish > completions/marathon.fish'

builds:
  - builder: rust
    flags:
      - --release
    targets:
      - x86_64-unknown-linux-gnu
      - x86_64-apple-darwin
      - x86_64-pc-windows-gnu
      - aarch64-unknown-linux-gnu
      - aarch64-apple-darwin

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

homebrew_casks:
  - name: marathon
    repository:
      owner: a-poor
      name: homebrew-tap
    homepage: "https://github.com/a-poor/marathon"
    description: "CLI/TUI for viewing, managing, and running markdown runbooks"
    # Generated by the `before` hooks above; paths are relative to the repo root.
    completions:
      bash: completions/marathon.bash
      zsh: completions/marathon.zsh
      fish: completions/marathon.fish
    # Binaries aren't notarized, so strip the Gatekeeper quarantine flag on
    # install — otherwise macOS blocks the binary with a "cannot be opened" error.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/marathon"]
          end

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
